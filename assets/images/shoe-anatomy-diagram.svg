<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" role="img" aria-labelledby="anatomyTitle anatomyDesc">
  <title id="anatomyTitle">Diagram of a running shoe's main parts</title>
  <desc id="anatomyDesc">Side profile of a shoe with five parts labeled: upper, heel counter, insole, midsole, and outsole.</desc>
  <rect width="500" height="280" fill="none"/>

  <!-- Outsole -->
  <path d="M60 220 C60 210 70 205 90 205 L400 205 C420 205 440 212 450 222 C455 227 452 235 440 235 L70 235 C62 235 58 228 60 220 Z" fill="#202a2c" opacity="0.85"/>
  <!-- Midsole -->
  <path d="M65 200 L410 200 C425 200 438 205 448 214 L440 216 L90 216 C75 216 65 210 65 200 Z" fill="#0d6e6e" opacity="0.35" stroke="#0d6e6e" stroke-width="2"/>
  <!-- Upper -->
  <path d="M70 200 C68 160 78 120 110 95 C140 72 190 62 260 62 C310 62 350 75 375 95 C382 101 388 112 392 125 L392 165 C392 180 400 190 410 198 L90 200 Z" fill="none" stroke="#202a2c" stroke-width="3"/>
  <!-- Heel counter -->
  <path d="M70 200 C68 165 76 130 100 105 L118 118 C100 140 94 168 96 196 Z" fill="#a8560d" opacity="0.25" stroke="#a8560d" stroke-width="2.5"/>
  <!-- Insole line -->
  <path d="M90 198 C150 190 260 188 392 165" fill="none" stroke="#55666a" stroke-width="2" stroke-dasharray="3 4"/>
  <!-- Laces -->
  <line x1="195" y1="78" x2="230" y2="105" stroke="#202a2c" stroke-width="2"/>
  <line x1="215" y1="72" x2="250" y2="100" stroke="#202a2c" stroke-width="2"/>
  <line x1="235" y1="68" x2="270" y2="96" stroke="#202a2c" stroke-width="2"/>

  <!-- Labels -->
  <line x1="100" y1="110" x2="55" y2="60" stroke="#a8560d" stroke-width="1.5"/>
  <text x="50" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#202a2c" text-anchor="end">Heel counter</text>

  <line x1="230" y1="70" x2="230" y2="30" stroke="#202a2c" stroke-width="1.5"/>
  <text x="230" y="20" font-family="-apple-system, sans-serif" font-size="13" fill="#202a2c" text-anchor="middle">Upper</text>

  <line x1="240" y1="192" x2="240" y2="245" stroke="#55666a" stroke-width="1.5"/>
  <text x="240" y="260" font-family="-apple-system, sans-serif" font-size="13" fill="#202a2c" text-anchor="middle">Insole</text>

  <line x1="150" y1="210" x2="150" y2="255" stroke="#0d6e6e" stroke-width="1.5"/>
  <text x="150" y="270" font-family="-apple-system, sans-serif" font-size="13" fill="#202a2c" text-anchor="middle">Midsole</text>

  <line x1="380" y1="222" x2="440" y2="255" stroke="#202a2c" stroke-width="1.5"/>
  <text x="445" y="265" font-family="-apple-system, sans-serif" font-size="13" fill="#202a2c" text-anchor="start">Outsole</text>
</svg>
