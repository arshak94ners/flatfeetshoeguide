<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-labelledby="pronationTitle pronationDesc">
  <title id="pronationTitle">Illustration comparing neutral ankle alignment to overpronation</title>
  <desc id="pronationDesc">Rear view of two ankles during a step. One stays upright over a vertical reference line. The other rolls inward past the line, illustrating overpronation.</desc>
  <rect width="400" height="260" fill="none"/>

  <text x="90" y="24" font-family="Georgia, serif" font-size="15" fill="#55666a" text-anchor="middle">Neutral</text>
  <line x1="90" y1="40" x2="90" y2="210" stroke="#e0e8e7" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M75 60 C68 90 68 130 74 155 L106 155 C112 130 112 90 105 60 Z" fill="#0d6e6e" opacity="0.16" stroke="#0d6e6e" stroke-width="3"/>
  <ellipse cx="90" cy="205" rx="42" ry="14" fill="#0d6e6e" opacity="0.12" stroke="#0d6e6e" stroke-width="3"/>
  <text x="90" y="235" font-family="-apple-system, sans-serif" font-size="12" fill="#55666a" text-anchor="middle">Ankle stays over the heel</text>

  <text x="310" y="24" font-family="Georgia, serif" font-size="15" fill="#55666a" text-anchor="middle">Overpronation</text>
  <line x1="310" y1="40" x2="310" y2="210" stroke="#e0e8e7" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M300 60 C285 92 282 130 292 152 L322 158 C330 132 322 92 330 62 Z" fill="#a34a1a" opacity="0.16" stroke="#a34a1a" stroke-width="3"/>
  <ellipse cx="310" cy="205" rx="42" ry="14" fill="#a34a1a" opacity="0.12" stroke="#a34a1a" stroke-width="3"/>
  <text x="310" y="235" font-family="-apple-system, sans-serif" font-size="12" fill="#55666a" text-anchor="middle">Ankle rolls inward past the line</text>
</svg>
